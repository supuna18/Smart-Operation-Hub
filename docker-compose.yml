
services:
  backend:
    build: ./backend
    ports:
      - "8081:8080"
    networks:
      - app-network

  frontend:
    # මෙතන ඔබේ React folder එකේ නම දෙන්න (උදා: ./frontend)
    build: ./frontend 
    ports:
      - "5174:5173"
    stdin_open: true
    tty: true
    networks:
      - app-network

networks:
  app-network:
    driver: bridge