
services:
  backend:
    build: ./backend
    ports:
      - "8082:8082"
    networks:
      - app-network

    dns:
      - 8.8.8.8
      - 8.8.4.4

  frontend:
    # මෙතන ඔබේ React folder එකේ නම දෙන්න (උදා: ./frontend)
    build: ./frontend 
    ports:
      - "5174:5173"
    stdin_open: true
    tty: true
    networks:
      - app-network

networks:
  app-network:
    driver: bridge